<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyUI - 下拉框组件展示</title>
    <!-- 引入下拉框组件的样式文件 -->
    <link rel="stylesheet" href="candy-dropdown.css">
    <style>
        /* 全局样式 - 深色主题背景 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #e0e0e0;
        }

        /* 页面标题样式 */
        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 40px;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
        }

        h1 span {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 展示区域容器 */
        .showcase {
            max-width: 900px;
            margin: 0 auto;
        }

        /* 分组标题样式 */
        .section-title {
            color: #a0a0a0;
            font-size: 1.2rem;
            margin: 40px 0 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 下拉框网格布局 */
        .dropdown-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        /* 下拉框容器样式 - 深色主题适配 */
        .candy-dropdown-container {
            margin: 10px 0;
        }

        .candy-dropdown {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #e0e0e0;
        }

        .candy-dropdown:hover {
            border-color: #667eea;
        }

        .candy-dropdown:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        .candy-dropdown-display {
            color: #e0e0e0;
        }

        .candy-dropdown-arrow::before {
            border-bottom: 6px solid #a0a0a0;
        }

        .candy-dropdown-arrow::after {
            border-top: 6px solid #a0a0a0;
        }

        .candy-dropdown-menu {
            background: #1e1e2e;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .candy-dropdown-option {
            color: #e0e0e0;
        }

        .candy-dropdown-option:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .candy-dropdown-option.selected {
            background-color: rgba(102, 126, 234, 0.3);
            color: #667eea;
        }

        .candy-dropdown-option.disabled {
            color: #666;
        }

        .candy-dropdown-placeholder {
            color: #888;
        }

        /* 尺寸展示卡片 */
        .size-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
        }

        /* 颜色标题样式 */
        .color-title {
            color: #667eea;
            font-size: 1rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* 标签样式 */
        .label {
            display: block;
            color: #b0b0b0;
            font-size: 14px;
            margin-bottom: 8px;
        }

        /* 下拉框包装器 */
        .dropdown-wrapper {
            margin-bottom: 15px;
        }

        /* 禁用状态下拉框 */
        .candy-dropdown[disabled],
        .candy-dropdown-container.disabled .candy-dropdown {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1><span>CandyUI</span> 下拉框组件</h1>

    <div class="showcase">
        <!-- 不同颜色下拉框展示 -->
        <h2 class="section-title">不同颜色下拉框</h2>

        <div class="dropdown-grid">
            <!-- 默认颜色下拉框 -->
            <div class="size-card">
                <div class="color-title">默认颜色</div>
                <div class="candy-dropdown-container">
                    <select class="candy-dropdown">
                        <option value="">请选择选项</option>
                        <option value="1">选项一</option>
                        <option value="2">选项二</option>
                        <option value="3">选项三</option>
                    </select>
                </div>
            </div>

            <!-- 成功颜色下拉框 -->
            <div class="size-card">
                <div class="color-title">成功颜色</div>
                <div class="candy-dropdown-container candy-dropdown-success">
                    <select class="candy-dropdown">
                        <option value="">请选择</option>
                        <option value="success1">成功选项一</option>
                        <option value="success2">成功选项二</option>
                        <option value="success3">成功选项三</option>
                    </select>
                </div>
            </div>

            <!-- 警告颜色下拉框 -->
            <div class="size-card">
                <div class="color-title">警告颜色</div>
                <div class="candy-dropdown-container candy-dropdown-warning">
                    <select class="candy-dropdown">
                        <option value="">请选择</option>
                        <option value="warning1">警告选项一</option>
                        <option value="warning2">警告选项二</option>
                        <option value="warning3">警告选项三</option>
                    </select>
                </div>
            </div>

            <!-- 危险颜色下拉框 -->
            <div class="size-card">
                <div class="color-title">危险颜色</div>
                <div class="candy-dropdown-container candy-dropdown-danger">
                    <select class="candy-dropdown">
                        <option value="">请选择</option>
                        <option value="danger1">危险选项一</option>
                        <option value="danger2">危险选项二</option>
                        <option value="danger3">危险选项三</option>
                    </select>
                </div>
            </div>

            <!-- 信息颜色下拉框 -->
            <div class="size-card">
                <div class="color-title">信息颜色</div>
                <div class="candy-dropdown-container candy-dropdown-info">
                    <select class="candy-dropdown">
                        <option value="">请选择</option>
                        <option value="info1">信息选项一</option>
                        <option value="info2">信息选项二</option>
                        <option value="info3">信息选项三</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 不同尺寸下拉框展示 -->
        <h2 class="section-title">不同尺寸下拉框</h2>

        <div class="dropdown-grid">
            <!-- 大尺寸下拉框 -->
            <div class="size-card">
                <div class="color-title">大尺寸下拉框</div>
                <div class="candy-dropdown-container candy-dropdown-lg">
                    <select class="candy-dropdown">
                        <option value="">大尺寸选择</option>
                        <option value="lg1">大尺寸选项一</option>
                        <option value="lg2">大尺寸选项二</option>
                    </select>
                </div>
            </div>

            <!-- 默认尺寸下拉框 -->
            <div class="size-card">
                <div class="color-title">默认尺寸下拉框</div>
                <div class="candy-dropdown-container">
                    <select class="candy-dropdown">
                        <option value="">默认选择</option>
                        <option value="default1">默认选项一</option>
                        <option value="default2">默认选项二</option>
                    </select>
                </div>
            </div>

            <!-- 小尺寸下拉框 -->
            <div class="size-card">
                <div class="color-title">小尺寸下拉框</div>
                <div class="candy-dropdown-container candy-dropdown-sm">
                    <select class="candy-dropdown">
                        <option value="">小尺寸</option>
                        <option value="sm1">小选项一</option>
                        <option value="sm2">小选项二</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 带选中状态的下拉框 -->
        <h2 class="section-title">带选中状态的下拉框</h2>

        <div class="dropdown-grid">
            <!-- 选中状态的示例 -->
            <div class="size-card">
                <div class="color-title">已选中选项</div>
                <div class="candy-dropdown-container">
                    <select class="candy-dropdown">
                        <option value="">请选择</option>
                        <option value="apple" selected>苹果</option>
                        <option value="banana">香蕉</option>
                        <option value="orange">橙子</option>
                    </select>
                </div>
            </div>

            <!-- 禁用选项的示例 -->
            <div class="size-card">
                <div class="color-title">包含禁用选项</div>
                <div class="candy-dropdown-container">
                    <select class="candy-dropdown">
                        <option value="">请选择</option>
                        <option value="enabled1">可用选项一</option>
                        <option value="disabled" disabled>禁用选项</option>
                        <option value="enabled2">可用选项二</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 实际应用场景示例 -->
        <h2 class="section-title">实际应用示例</h2>

        <div class="dropdown-grid">
            <!-- 国家选择 -->
            <div class="size-card">
                <div class="color-title">国家选择</div>
                <div class="dropdown-wrapper">
                    <span class="label">请选择国家</span>
                    <div class="candy-dropdown-container">
                        <select class="candy-dropdown">
                            <option value="">选择国家</option>
                            <option value="cn">中国</option>
                            <option value="us">美国</option>
                            <option value="jp">日本</option>
                            <option value="kr">韩国</option>
                            <option value="uk">英国</option>
                            <option value="de">德国</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 城市选择 -->
            <div class="size-card">
                <div class="color-title">城市选择</div>
                <div class="dropdown-wrapper">
                    <span class="label">请选择城市</span>
                    <div class="candy-dropdown-container candy-dropdown-info">
                        <select class="candy-dropdown">
                            <option value="">选择城市</option>
                            <option value="bj">北京</option>
                            <option value="sh">上海</option>
                            <option value="gz">广州</option>
                            <option value="sz">深圳</option>
                            <option value="cd">成都</option>
                            <option value="wh">武汉</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入下拉框组件的JavaScript文件 -->
    <script src="candy-dropdown.js"></script>
</body>
</html>
