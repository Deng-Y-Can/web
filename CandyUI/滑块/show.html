<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyUI - 滑块组件展示</title>
    <!-- 引入滑块组件的样式文件 -->
    <link rel="stylesheet" href="candy-slider.css">
    <style>
        /* 全局样式 - 深色主题背景 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #e0e0e0;
        }

        /* 页面标题样式 */
        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 40px;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
        }

        h1 span {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 展示区域容器 */
        .showcase {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 分组标题样式 */
        .section-title {
            color: #a0a0a0;
            font-size: 1.2rem;
            margin: 40px 0 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 滑块容器样式 - 深色主题适配 */
        .candy-slider-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .candy-slider-label {
            color: #e0e0e0;
        }

        .candy-slider-value {
            color: #667eea;
        }

        /* 不同颜色滑块的展示行 */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .slider-label {
            min-width: 80px;
            color: #b0b0b0;
            font-size: 14px;
        }

        /* 尺寸展示区域的网格布局 */
        .size-showcase {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* 尺寸标题样式 */
        .size-title {
            color: #667eea;
            font-size: 1rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* 大尺寸滑块样式调整 */
        .candy-slider-lg .candy-slider-container {
            --slider-track-height: 12px;
            --slider-thumb-size: 32px;
        }

        /* 小尺寸滑块样式调整 */
        .candy-slider-sm .candy-slider-container {
            --slider-track-height: 4px;
            --slider-thumb-size: 16px;
        }

        /* 尺寸展示卡片 */
        .size-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1><span>CandyUI</span> 滑块组件</h1>

    <div class="showcase">
        <!-- 不同颜色滑块展示 -->
        <h2 class="section-title">不同颜色滑块</h2>

        <!-- 默认颜色滑块 -->
        <div class="slider-row">
            <span class="slider-label">默认颜色</span>
            <div class="candy-slider-container">
                <div class="candy-slider-label">默认渐变</div>
                <div class="candy-slider-row">
                    <input type="range" class="candy-slider" min="0" max="100" value="50">
                    <span class="candy-slider-value">50</span>
                </div>
                <div class="candy-slider-track" style="width: 50%;"></div>
            </div>
        </div>

        <!-- 成功颜色滑块 -->
        <div class="slider-row">
            <span class="slider-label">成功颜色</span>
            <div class="candy-slider-container">
                <div class="candy-slider-label">绿色渐变</div>
                <div class="candy-slider-row">
                    <input type="range" class="candy-slider candy-slider-success" min="0" max="100" value="75">
                    <span class="candy-slider-value">75</span>
                </div>
                <div class="candy-slider-track" style="width: 75%;"></div>
            </div>
        </div>

        <!-- 警告颜色滑块 -->
        <div class="slider-row">
            <span class="slider-label">警告颜色</span>
            <div class="candy-slider-container">
                <div class="candy-slider-label">橙色渐变</div>
                <div class="candy-slider-row">
                    <input type="range" class="candy-slider candy-slider-warning" min="0" max="100" value="60">
                    <span class="candy-slider-value">60</span>
                </div>
                <div class="candy-slider-track" style="width: 60%;"></div>
            </div>
        </div>

        <!-- 危险颜色滑块 -->
        <div class="slider-row">
            <span class="slider-label">危险颜色</span>
            <div class="candy-slider-container">
                <div class="candy-slider-label">粉红渐变</div>
                <div class="candy-slider-row">
                    <input type="range" class="candy-slider candy-slider-danger" min="0" max="100" value="85">
                    <span class="candy-slider-value">85</span>
                </div>
                <div class="candy-slider-track" style="width: 85%;"></div>
            </div>
        </div>

        <!-- 信息颜色滑块 -->
        <div class="slider-row">
            <span class="slider-label">信息颜色</span>
            <div class="candy-slider-container">
                <div class="candy-slider-label">蓝色渐变</div>
                <div class="candy-slider-row">
                    <input type="range" class="candy-slider candy-slider-info" min="0" max="100" value="40">
                    <span class="candy-slider-value">40</span>
                </div>
                <div class="candy-slider-track" style="width: 40%;"></div>
            </div>
        </div>

        <!-- 不同尺寸滑块展示 -->
        <h2 class="section-title">不同尺寸滑块</h2>

        <div class="size-showcase">
            <!-- 大尺寸滑块 -->
            <div class="size-card">
                <div class="size-title">大尺寸滑块</div>
                <div class="candy-slider-container" style="--slider-track-height: 12px; --slider-thumb-size: 32px;">
                    <div class="candy-slider-row">
                        <input type="range" class="candy-slider" min="0" max="100" value="50">
                        <span class="candy-slider-value">50</span>
                    </div>
                    <div class="candy-slider-track" style="width: 50%;"></div>
                </div>
            </div>

            <!-- 默认尺寸滑块 -->
            <div class="size-card">
                <div class="size-title">默认尺寸滑块</div>
                <div class="candy-slider-container">
                    <div class="candy-slider-row">
                        <input type="range" class="candy-slider" min="0" max="100" value="50">
                        <span class="candy-slider-value">50</span>
                    </div>
                    <div class="candy-slider-track" style="width: 50%;"></div>
                </div>
            </div>

            <!-- 小尺寸滑块 -->
            <div class="size-card">
                <div class="size-title">小尺寸滑块</div>
                <div class="candy-slider-container" style="--slider-track-height: 4px; --slider-thumb-size: 16px;">
                    <div class="candy-slider-row">
                        <input type="range" class="candy-slider" min="0" max="100" value="50">
                        <span class="candy-slider-value">50</span>
                    </div>
                    <div class="candy-slider-track" style="width: 50%;"></div>
                </div>
            </div>
        </div>

        <!-- 带自定义范围的滑块 -->
        <h2 class="section-title">自定义范围</h2>

        <div class="slider-row">
            <span class="slider-label">音量控制</span>
            <div class="candy-slider-container">
                <div class="candy-slider-row">
                    <input type="range" class="candy-slider candy-slider-info" min="0" max="100" value="30">
                    <span class="candy-slider-value">30</span>
                </div>
                <div class="candy-slider-track" style="width: 30%;"></div>
            </div>
        </div>

        <div class="slider-row">
            <span class="slider-label">进度百分比</span>
            <div class="candy-slider-container">
                <div class="candy-slider-row">
                    <input type="range" class="candy-slider candy-slider-success" min="0" max="100" value="0">
                    <span class="candy-slider-value">0</span>
                </div>
                <div class="candy-slider-track" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <!-- 引入滑块组件的JavaScript文件 -->
    <script src="candy-slider.js"></script>
</body>
</html>
